name: smart_home_ai
description: AI+IoT Smart Home Application for iOS, Android & Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_database: ^10.4.0
  firebase_messaging: ^14.7.9
  provider: ^6.1.1
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  flutter_local_notifications: ^17.0.0
  syncfusion_flutter_gauges: ^24.1.41
  flutter_animate: ^4.3.0
  uuid: ^4.2.1
  mqtt_client: ^10.2.0
  web_socket_channel: ^2.4.0
  rxdart: ^0.27.7
  path_provider: ^2.1.1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
